name: Deploy Frontend

on:
  push:
    branches: [main]
    paths:
      - 'frontend/**'
      - '.github/workflows/deploy-frontend.yml'
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Build
        working-directory: frontend
        env:
          NEXT_PUBLIC_AZURE_CLIENT_ID: 0f040abb-27b3-466b-8607-a001efe601b2
          NEXT_PUBLIC_AZURE_TENANT_ID: a6fb798f-e860-4e9c-9af8-9f0766fbdcce
          NEXT_PUBLIC_AZURE_REDIRECT_URI: https://red-sand-034cb380f.7.azurestaticapps.net
          NEXT_PUBLIC_API_BASE_URL: https://func-azureoptimize-jmf62z.azurewebsites.net/api
        run: |
          npm ci
          npm run build

      - name: Deploy to Azure Static Web Apps
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: upload
          app_location: frontend/out
          skip_app_build: true
