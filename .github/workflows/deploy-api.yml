name: Deploy API

on:
  push:
    branches: [main]
    paths:
      - 'api/**'
      - '.github/workflows/deploy-api.yml'
  workflow_dispatch:
    inputs:
      client_environment:
        description: 'Client environment name (set by deploy script, e.g. rg-contoso)'
        required: false
        default: 'default'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment: ${{ inputs.client_environment || 'default' }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: api/package-lock.json

      - name: Build
        working-directory: api
        run: |
          npm ci
          npm run build
          npm ci --omit=dev
          # Staging dir: only runtime files (no src/, no tsconfig, no package-lock)
          mkdir -p ../api-deploy
          cp -r dist ../api-deploy/
          cp -r node_modules ../api-deploy/
          cp host.json package.json ../api-deploy/

      - name: Deploy to Azure Functions
        uses: Azure/functions-action@v1
        with:
          app-name: ${{ vars.AZURE_FUNCTIONAPP_NAME }}
          package: ./api-deploy
          publish-profile: ${{ secrets.AZURE_FUNCTIONAPP_PUBLISH_PROFILE }}
